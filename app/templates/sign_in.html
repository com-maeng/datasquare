<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/sign_in.css" />
    <title>Login</title>
</head>
<body>
    
    <div class="container">
        <form method="post">
            <div class="right-column">
                <div class="section-text">
                    <span class="secondary-headline">Sign In</span>
                </div>
                <div class="form-5-fields-checkbox-button">
                    <div class="text-field">
                        <div class="label">Email</div>
                        <div class="field">
                            <input type="string" name="email" placeholder="Enter your email" value="{{email}}"/>
                        </div>
                    </div>
                    <div class="text-field">
                        <div class="label">Password</div>
                        <div class="field">
                            <input type="password" name="password" placeholder="Enter your password" value="{{password}}"/>
                        </div>
                    </div>
                    
            </div>
                <div class="sep"></div>
                <div class="sign-in"><input type="submit" value = "Sign In"> </div>
            </form>
            <div class="horizontal-line"></div>  
            <a href="signup">Sign up</a>  
    </div>
        
        
    
</body>
</html>
